name: Build WorkPay Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Apply native background-location patch
        run: |
          cp native-patches/BackgroundGeolocationService.java node_modules/@capacitor-community/background-geolocation/android/src/main/java/com/equimaps/capacitor_background_geolocation/BackgroundGeolocationService.java
          cp native-patches/BackgroundGeolocation.java node_modules/@capacitor-community/background-geolocation/android/src/main/java/com/equimaps/capacitor_background_geolocation/BackgroundGeolocation.java

      - name: Install obfuscator
        run: npm install --no-save javascript-obfuscator

      - name: Obfuscate JavaScript before build
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const JavaScriptObfuscator = require('javascript-obfuscator');

          let html = fs.readFileSync('index.html', 'utf8');

          html = html.replace(/<script(?![^>]*src=)[^>]*>([\s\S]*?)<\/script>/g, (match, code) => {
            if (!code.trim()) return match;
            const result = JavaScriptObfuscator.obfuscate(code, {
              compact: true,
              controlFlowFlattening: false,
              deadCodeInjection: false,
              stringArray: true,
              stringArrayEncoding: ['base64'],
              stringArrayThreshold: 0.75,
              identifierNamesGenerator: 'hexadecimal',
              renameGlobals: false,
              selfDefending: false,
              disableConsoleOutput: true
            }).getObfuscatedCode();
            return match.replace(code, result);
          });

          fs.writeFileSync('index.obfuscated.html', html);
          NODE

      - name: Prepare web assets
        run: mkdir -p www && cp index.obfuscated.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Add Firebase (FCM push notifications) config
        run: |
          cp google-services.json android/app/google-services.json
          python3 - <<'PY'
          # Ensure the root build.gradle has the google-services classpath
          # (goes in the buildscript { dependencies { ... } } block, which is
          # the first "dependencies {" in Capacitor's generated root file).
          root_path = "android/build.gradle"
          with open(root_path) as f:
              root = f.read()
          if 'com.google.gms:google-services' not in root:
              root = root.replace(
                  "dependencies {",
                  "dependencies {\n        classpath 'com.google.gms:google-services:4.4.2'",
                  1
              )
              with open(root_path, 'w') as f:
                  f.write(root)

          # Ensure the app module actually applies the plugin. Capacitor's
          # template sometimes already conditionally applies it if
          # google-services.json is present — only add it if it's missing,
          # so we never apply it twice.
          app_path = "android/app/build.gradle"
          with open(app_path) as f:
              app = f.read()
          if "com.google.gms.google-services" not in app:
              app += "\napply plugin: 'com.google.gms.google-services'\n"
              with open(app_path, 'w') as f:
                  f.write(app)
          PY

      - name: Insert location permissions into AndroidManifest
        run: sed -i '/<manifest /r manifest-permissions.xml' android/app/src/main/AndroidManifest.xml

      - name: Keep tracking service alive when app is swiped from recents
        run: |
          python3 - <<'PY'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              content = f.read()

          # tools:node="merge" below needs the tools namespace declared on <manifest>
          if 'xmlns:tools=' not in content:
              content = content.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android"',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools"'
              )

          # Overrides just the stopWithTask attribute on the plugin's own
          # service (merged in from its AAR) so swiping WorkPay away from
          # recents no longer kills the location-tracking foreground service.
          service_override = (
              '    <service\n'
              '        android:name="com.equimaps.capacitor_background_geolocation.BackgroundGeolocationService"\n'
              '        android:stopWithTask="false"\n'
              '        tools:node="merge" />\n'
          )
          content = content.replace('</application>', service_override + '</application>')

          with open(path, 'w') as f:
              f.write(content)
          PY

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: workpay-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
